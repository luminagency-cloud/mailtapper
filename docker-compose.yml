# mailtapper v1 — pull-only access layer. No worker service (nothing is polled/stored).
services:
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MAILTAPPER_KEK_B64: ${MAILTAPPER_KEK_B64}
      MAILTAPPER_LOCATOR_SECRET: ${MAILTAPPER_LOCATOR_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      DEFAULT_TIER: ${DEFAULT_TIER:-pro}
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api

volumes:
  caddy_data: {}
